<div class="login-container">
  <div class="login-card">
    
    <h2>{{ selectedEtablissement?.nom }}</h2>
    <p class="lieu-info">📍 Agence: {{ selectedLieu?.nom }} - {{ selectedLieu?.adresse }}</p>
    
    <h3>Connexion</h3>
    <p class="login-subtitle">Accédez à votre espace de travail</p>
    
    <div class="form-group">
      <input type="text" 
             placeholder="Nom d'utilisateur" 
             [(ngModel)]="user.username"
             class="form-input">
    </div>
    
    <div class="form-group">
      <input type="password" 
             placeholder="Mot de passe" 
             [(ngModel)]="user.password"
             class="form-input">
    </div>
    
    <button (click)="login()" class="btn-login-submit" [disabled]="loading">
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>
    
    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }
    
  </div>
</div>
